<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="55%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#glow)"/>

  <!-- Abstract mark: upward arrow + accent dot (growth + precision) -->
  <g fill="none" stroke="#F3F0FF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left stroke of 'arrow' -->
    <path d="M34 82 L64 42"/>
    <!-- Right stroke of 'arrow' -->
    <path d="M64 42 L94 82"/>
    <!-- Horizontal bar -->
    <path d="M46 68 L82 68"/>
  </g>

  <!-- Amber accent dot at the arrow tip -->
  <circle cx="64" cy="42" r="7" fill="url(#gold)"/>
  <circle cx="64" cy="42" r="7" fill="url(#gold)" opacity="0.5" />
</svg>
